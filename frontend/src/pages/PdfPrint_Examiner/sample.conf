<VirtualHost *:80>
        # The ServerName directive sets the request scheme, hostname and port
        # the server uses to identify itself. This is used when creating
        # redirection URLs. In the context of virtual hosts, the ServerName
        # specifies what hostname must appear in the request's Host: header to
        # match this virtual host. For the default virtual host (this file)
        # value is not decisive as it is used as a last resort host regardless.
        # However, you must set it for any further virtual host explicitly.
        ServerName yourdomain.com

        ServerAdmin webmaster@localhost
        DocumentRoot /var/www/html

        # ===============================================
        # Proxy Configuration for Node.js Backend
        # ===============================================
        ProxyPreserveHost On
        
        # Set X-Forwarded headers to capture real client IP
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "http"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
        RequestHeader set X-Forwarded-Port "80"
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        
        # Proxy pass to Node.js backend (adjust port as needed)
        ProxyPass / http://localhost:5000/
        ProxyPassReverse / http://localhost:5000/
        ProxyTimeout 300

        # ===============================================
        # Logging Configuration with Real Client IP
        # ===============================================
        
        # Custom log format to show real client IP from X-Forwarded-For
        LogFormat "%{X-Forwarded-For}i %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" forwarded
        
        # Apply custom log format
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log forwarded
        
        # Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
        # error, crit, alert, emerg.
        # It is also possible to configure the loglevel for particular
        # modules, e.g.
        #LogLevel info ssl:warn

